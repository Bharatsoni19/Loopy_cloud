# ═══════════════════════════════════════════════════════════════════════
#  Loopy API Gateway  (nginx)
#  Syllabus coverage: API gateway · routing · throttling (rate limiting) ·
#  compression · security headers (OWASP) · load balancing · observability
#
#  Single public entrypoint on :80
#    /                 → static frontend (the Loopy SPA)
#    /api/pay/   …     → payments  microservice  (Loop Cards / ledger)
#    /api/neural/ …    → neural    backend       (TF models + /ws/admin)
#    /api/rag/   …     → rag        service        (Ask Loopy)
#    /healthz          → gateway liveness
# ═══════════════════════════════════════════════════════════════════════

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;                       # don't leak nginx version (OWASP)

    # ── Observability: structured access log (CloudWatch-friendly) ────────
    log_format  json escape=json '{'
        '"ts":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"rt":$request_time,'
        '"upstream":"$upstream_addr",'
        '"ua":"$http_user_agent"'
    '}';
    access_log  /var/log/nginx/access.log  json;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # ── Performance: response compression (syllabus: compression) ─────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   512;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/javascript application/xml application/wasm image/svg+xml;

    # ── Throttling: token-bucket rate limit zones (syllabus: throttling) ──
    #   api  — general traffic        : 20 req/s, burst 40
    #   auth — token/mint endpoints   :  5 req/s, burst 10  (stricter)
    limit_req_zone  $binary_remote_addr  zone=api:10m   rate=20r/s;
    limit_req_zone  $binary_remote_addr  zone=auth:10m  rate=5r/s;
    limit_req_status        429;
    limit_conn_zone $binary_remote_addr  zone=conns:10m;

    # ── Upstreams (one server each now; ready for load-balanced scale-out) ─
    upstream payments_up { server payments:8100; keepalive 16; }
    upstream neural_up   { server neural:8000;   keepalive 16; }
    upstream rag_up      { server rag:8200;      keepalive 16; }

    # Shared proxy headers
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;

    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    server {
        listen      80 default_server;
        server_name _;
        root        /usr/share/nginx/html;
        index       loopy-mega-v1.html index.html;

        limit_conn  conns 50;

        # ── Security headers (syllabus: API security / OWASP) ─────────────
        add_header X-Content-Type-Options    "nosniff"            always;
        add_header X-Frame-Options           "SAMEORIGIN"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection          "1; mode=block"      always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;

        # ── Gateway liveness ──────────────────────────────────────────────
        location = /healthz { default_type application/json; return 200 '{"gateway":"ok"}'; }

        # ── Route: Payments microservice (Loop Cards) ─────────────────────
        # Auth/token endpoints get the stricter limiter.
        location = /api/pay/auth/token {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://payments_up/auth/token;
        }
        location /api/pay/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://payments_up/;          # trailing / strips the prefix
        }

        # ── Route: RAG (Ask Loopy) ────────────────────────────────────────
        location /api/rag/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://rag_up/;
        }

        # ── Route: Neural backend (+ WebSocket admin stream) ──────────────
        location /api/neural/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://neural_up/;
            proxy_set_header Upgrade    $http_upgrade;    # WebSocket upgrade
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;                     # long-lived admin WS
        }

        # ── Static frontend (SPA) ─────────────────────────────────────────
        location / {
            try_files $uri $uri/ /loopy-mega-v1.html;
        }
    }
}
