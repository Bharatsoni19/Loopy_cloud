###############################################################################
#  Loopy — CI/CD pipeline  (syllabus: CI/CD pipelines, DevSecOps, IaC)
#
#  Stages:   lint  →  test  →  security (DevSecOps)  →  iac-validate
#            →  build & push images  →  deploy to EC2
#
#  Pushes to main run the full pipeline incl. deploy. PRs run everything
#  except deploy (the quality gate). Secrets are configured in the repo:
#    EC2_HOST, EC2_SSH_KEY, GHCR auto-token (GITHUB_TOKEN).
###############################################################################
name: loopy-ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 1. LINT ────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check services glue || true   # advisory, never blocks the build

  # ── 2. TEST (quality gate) ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install
        run: |
          pip install -r services/payments/requirements.txt
          pip install pandas pyarrow
      - name: Payment ledger tests
        run: cd services/payments && python -m pytest tests/ -q
      - name: Glue ETL logic test
        run: python glue/test_etl_local.py

  # ── 3. SECURITY  (DevSecOps) ───────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: SAST — Bandit (Python)
        run: pip install bandit && bandit -r services -ll || true
      - name: Secrets scan — Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
      - name: Dependency & IaC scan — Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"   # report only in coursework; set 1 to enforce

  # ── 4. IaC VALIDATE ────────────────────────────────────────
  iac-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt + validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate

  # ── 5. BUILD & PUSH IMAGES ─────────────────────────────────
  build:
    needs: [test, security, iac-validate]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [payments, neural, rag]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 6. DEPLOY TO EC2 ───────────────────────────────────────
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (pull latest images + recreate stack)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/loopy
            git pull --rebase
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
