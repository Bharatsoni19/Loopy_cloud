apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: CloudWatch
    type: cloudwatch
    jsonData:
      authType: default            # uses the EC2 instance role
      defaultRegion: ${AWS_REGION:ap-south-1}
    editable: true
